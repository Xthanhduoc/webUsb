<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB PRO VIP - IIT Edition</title>
    <style>
        /* CSS: Giữ nguyên phong cách Công nghệ */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        .container { 
            text-align: center; 
            padding: 50px; 
            border-radius: 20px; 
            background: rgba(22, 27, 34, 0.85); 
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.15); 
            border: 1px solid #30363d; 
            max-width: 650px; 
            width: 90%; 
            position: relative; 
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        h1 { 
            color: #58a6ff; 
            font-size: 2.8em; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        p.subtitle { 
            color: #8b949e; 
            font-size: 1.1em; 
            margin-bottom: 40px; 
            line-height: 1.6; 
        }

        .download-btn { 
            display: inline-block; 
            padding: 16px 45px; 
            font-size: 1.2em; 
            font-weight: bold; 
            color: #ffffff; 
            background: linear-gradient(135deg, #2ea043, #238636); 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            text-decoration: none; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 8px 20px rgba(46, 160, 67, 0.3); 
            position: relative; 
            overflow: hidden; 
        }

        .download-btn:hover { 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 12px 25px rgba(46, 160, 67, 0.5); 
        }

        .features { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 40px; 
            text-align: left; 
        }

        .feature-card { 
            background: #21262d; 
            padding: 20px; 
            border-radius: 12px; 
            width: 45%; 
            border-left: 4px solid #58a6ff; 
        }

        #particles { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="container">
        <h1>USB PRO VIP</h1>
        <p class="subtitle">Trạm điều khiển trung tâm cho Vi điều khiển CH55x.<br>Sức mạnh từ đội ngũ <b>IIT</b>.</p>
        
        <a href="#" class="download-btn" id="dl-btn">⬇ Tải Phần Mềm (v1.0)</a>
        
        <div class="features">
            <div class="feature-card">
                <h3 style="color: #58a6ff; margin-top: 0;">⚡ IIT Speed</h3>
                <p style="font-size: 0.9em; color: #8b949e;">Tối ưu hóa mã nguồn bởi các chuyên gia IIT cho tốc độ phản hồi cực nhanh.</p>
            </div>
            <div class="feature-card">
                <h3 style="color: #3fb950; margin-top: 0;">🔧 Linh Hoạt</h3>
                <p style="font-size: 0.9em; color: #8b949e;">Hỗ trợ đa nền tảng, cắm là chạy, giao diện thân thiện người dùng.</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        const particlesArray = [];
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Kích thước font chữ ngẫu nhiên từ 10px đến 18px
                this.fontSize = Math.random() * 8 + 10; 
                this.speedX = Math.random() * 1.0 - 0.5; 
                this.speedY = Math.random() * 1.0 - 0.5;
                // Độ mờ ngẫu nhiên để tạo chiều sâu
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < -20) this.x = canvas.width + 20;
                if (this.x > canvas.width + 20) this.x = -20;
                if (this.y < -20) this.y = canvas.height + 20;
                if (this.y > canvas.height + 20) this.y = -20;
            }
            draw() {
                ctx.fillStyle = `rgba(88, 166, 255, ${this.opacity})`;
                ctx.font = `bold ${this.fontSize}px Arial`;
                // Thay vì vẽ hình tròn, ta vẽ chữ "IIT"
                ctx.fillText("IIT", this.x, this.y);
            }
        }
        
        // Tạo 60 chữ IIT bay lơ lửng
        for (let i = 0; i < 60; i++) {
            particlesArray.push(new Particle());
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Hiệu ứng nút bấm (giữ nguyên từ bản gốc)
        const dlBtn = document.getElementById('dl-btn');
        dlBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const originalText = this.innerHTML;
            this.innerHTML = "⏳ Đang kết nối IIT Server...";
            setTimeout(() => {
                this.innerHTML = "✅ Tải xuống bắt đầu!";
                setTimeout(() => { this.innerHTML = originalText; }, 3000);
            }, 2000);
        });
    </script>
</body>
</html>
